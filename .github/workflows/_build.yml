name: Build (reusable)

# Single source of truth for tds-tools-contract. Called by ci.yml (PR gate, no
# publish), and by dev.yml (push → @latest patch) / release.yml (manual bump).
# A @latest publish also dispatches a rebuild of the dependent site.
#
# tds-tools-contract is npm-only (no PHP half): the whole SDK is frontend/
# build-time TypeScript. The vitest suite gates every run.

on:
  workflow_call:
    inputs:
      publish_tag:
        description: "none = build only (CI); 'dev' = prerelease @dev; 'latest' = real release."
        required: false
        type: string
        default: none
      bump:
        description: Version bump for a 'latest' release (patch | minor | major).
        required: false
        type: string
        default: patch
      rebuild_site:
        description: Repo whose release.yml to dispatch after a @latest publish (site rebuild). Empty = none.
        required: false
        type: string
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NPM_TOKEN: ${{ secrets.PACKAGE_TOKEN }}
    # No `permissions:` block here - a reusable workflow cannot request more than
    # the caller's token holds, and the repo default is read-only. Each caller
    # grants least-privilege permissions instead.
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.PACKAGE_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@tracht-digital-solutions'

      - name: Install
        run: npm install --no-package-lock

      - name: Type check
        run: npm run type-check

      - name: Test
        run: npm run test:run

      - name: Build
        run: npm run build

      # --- Publish -----------------------------------------------------------
      - name: Publish prerelease (@dev)
        if: ${{ inputs.publish_tag == 'dev' }}
        run: |
          base=$(node -p "require('./package.json').version")
          npm version "${base}-dev.${{ github.run_number }}" --no-git-tag-version
          npm publish --tag dev
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PACKAGE_TOKEN }}

      - name: Release (@latest) + push tag
        # The bump commit carries [skip ci] so pushing it back to main does NOT
        # re-trigger the auto-release workflow (no publish loop).
        if: ${{ inputs.publish_tag == 'latest' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          new=$(npm version ${{ inputs.bump }} --no-git-tag-version)
          git add package.json
          git commit -m "release: ${new} [skip ci]"
          git tag -a "${new}" -m "release ${new}"
          npm publish
          git push --follow-tags origin HEAD:main
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PACKAGE_TOKEN }}

      - name: Dispatch site rebuild
        if: ${{ inputs.publish_tag == 'latest' && inputs.rebuild_site != '' }}
        env:
          GH_TOKEN: ${{ secrets.PACKAGE_TOKEN }}
        run: gh workflow run release.yml -R Tracht-Digital-Solutions/${{ inputs.rebuild_site }}

      # --- GitHub Packages version retention ---------------------------------
      - name: Prune old prerelease package versions (keep newest 5)
        continue-on-error: true  # best-effort housekeeping; needs delete:packages
        if: ${{ inputs.publish_tag != 'none' }}
        uses: actions/delete-package-versions@v5
        with:
          package-name: tds-tools-contract
          package-type: npm
          min-versions-to-keep: 5
          delete-only-pre-release-versions: 'true'
          token: ${{ secrets.PACKAGE_TOKEN }}

      - name: Prune old stable package versions (keep newest 10)
        continue-on-error: true  # best-effort housekeeping; needs delete:packages
        if: ${{ inputs.publish_tag == 'latest' }}
        uses: actions/delete-package-versions@v5
        with:
          package-name: tds-tools-contract
          package-type: npm
          min-versions-to-keep: 10
          ignore-versions: '^.*-.*$'
          token: ${{ secrets.PACKAGE_TOKEN }}
