name: Dev prerelease (push → GitHub Packages @dev)

# On every push to main, publish a prerelease (<version>-dev.<run>) under the
# `dev` dist-tag. It never becomes `latest`, so consumers' ^x.y.z ranges are
# unaffected. Real versions ship via release.yml (manual button). Pipeline body
# in _build.yml.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: dev-publish
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  prerelease:
    uses: ./.github/workflows/_build.yml
    with:
      publish_tag: dev
    secrets: inherit
